name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Check version bump
        run: |
          LOCAL_VERSION=$(node -p "require('./packages/cli/package.json').version")
          PUBLISHED_VERSION=$(npm view koincode version 2>/dev/null || echo "0.0.0")
          echo "Local version:     $LOCAL_VERSION"
          echo "Published version: $PUBLISHED_VERSION"

          if [ "$LOCAL_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "::error file=packages/cli/package.json::Version $LOCAL_VERSION is already published on npm. Bump packages/cli/package.json before merging — the publish workflow will fail on main otherwise."
            exit 1
          fi

          HIGHER=$(printf '%s\n%s\n' "$PUBLISHED_VERSION" "$LOCAL_VERSION" | sort -V | tail -n1)
          if [ "$HIGHER" != "$LOCAL_VERSION" ]; then
            echo "::error file=packages/cli/package.json::Version $LOCAL_VERSION is lower than the published version $PUBLISHED_VERSION. Bump packages/cli/package.json before merging."
            exit 1
          fi

      - name: Check platform package versions match
        run: |
          node -e '
            const pkg = require("./packages/cli/package.json");
            const stale = Object.entries(pkg.optionalDependencies || {})
              .filter(([name, v]) => name.startsWith("@koincode/") && v !== pkg.version);
            if (stale.length) {
              for (const [name, v] of stale) {
                console.log(`::error file=packages/cli/package.json::${name} is pinned to ${v} but package.json version is ${pkg.version}. compile.ts publishes platform packages at the main version — bump optionalDependencies to match, or npm will silently skip installing them.`);
              }
              process.exit(1);
            }
          '

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

  # Compiles a real standalone binary and boots it. Catches the class of failure that only exists
  # in `bun build --compile` output (bundled assets that don't resolve out of Bun's /$bunfs/
  # virtual filesystem, etc.) — which typecheck/lint/dev-mode all pass but that crashes a real
  # binary at startup (see the @opentui/core 0.4.5 regression). One platform is enough: this class
  # of crash is platform-agnostic.
  smoke-boot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build standalone binary (current platform)
        working-directory: packages/cli
        # A dummy analytics token lets this run on fork PRs with no secret (compile.ts only
        # requires the var to be non-empty). --preview bakes NODE_ENV="preview" so this throwaway
        # build never reports to production Sentry.
        env:
          MIXPANEL_TOKEN: smoke-test-dummy
        run: bun bin/compile.ts --single --preview

      - name: Smoke-test boot
        run: bash packages/cli/bin/smoke-test.sh packages/cli/dist/koincode-linux-x64
