name: Release Standalone Binaries

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - target_os: darwin
            target_arch: arm64
            runner: macos-latest
          - target_os: darwin
            target_arch: x64
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build standalone binary
        working-directory: packages/cli
        env:
          MIXPANEL_TOKEN: ${{ secrets.MIXPANEL_TOKEN }}
        run: bun bin/compile.ts --single

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: koincode-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: packages/cli/dist/koincode-*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build standalone binary
        working-directory: packages/cli
        env:
          MIXPANEL_TOKEN: ${{ secrets.MIXPANEL_TOKEN }}
        run: bun bin/compile.ts --single

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: koincode-linux-x64
          path: packages/cli/dist/koincode-*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build standalone binary
        working-directory: packages/cli
        env:
          MIXPANEL_TOKEN: ${{ secrets.MIXPANEL_TOKEN }}
        shell: bash
        run: bun bin/compile.ts --single

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: koincode-windows-x64
          path: packages/cli/dist/koincode-*

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x artifacts/koincode-* 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/koincode-*
