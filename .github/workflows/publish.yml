name: Publish & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

  build-macos:
    needs: check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build standalone binaries (arm64 + x64)
        working-directory: packages/cli
        env:
          MIXPANEL_TOKEN: ${{ secrets.MIXPANEL_TOKEN }}
        run: bun bin/compile.ts --os=darwin

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: koincode-darwin
          path: packages/cli/dist/koincode-*
          exclude: packages/cli/dist/npm/**

      - name: Upload npm packages
        uses: actions/upload-artifact@v4
        with:
          name: npm-darwin
          path: packages/cli/dist/npm/@koincode/darwin-*

  build-linux:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build standalone binaries (x64 + arm64)
        working-directory: packages/cli
        env:
          MIXPANEL_TOKEN: ${{ secrets.MIXPANEL_TOKEN }}
        run: bun bin/compile.ts --os=linux

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: koincode-linux
          path: packages/cli/dist/koincode-*
          exclude: packages/cli/dist/npm/**

      - name: Upload npm packages
        uses: actions/upload-artifact@v4
        with:
          name: npm-linux
          path: packages/cli/dist/npm/@koincode/linux-*

  build-windows:
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build standalone binary
        working-directory: packages/cli
        env:
          MIXPANEL_TOKEN: ${{ secrets.MIXPANEL_TOKEN }}
        shell: bash
        run: bun bin/compile.ts --single

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: koincode-windows-x64
          path: packages/cli/dist/koincode-*
          exclude: packages/cli/dist/npm/**

      - name: Upload npm package
        uses: actions/upload-artifact@v4
        with:
          name: npm-windows-x64
          path: packages/cli/dist/npm/@koincode/windows-*

  publish-platform-packages:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm for trusted publishing support
        # Pinned to 11.x, not `latest` — npm 12.0.0's provenance path is
        # missing its `sigstore` dependency (npm/cli#9722), which breaks
        # every `npm publish` here. 11.5.1+ is the minimum for trusted
        # publishing; ^11.5.1 stays on 11.x until that bug is fixed upstream.
        run: npm install -g npm@^11.5.1

      - name: Download all npm packages
        uses: actions/download-artifact@v4
        with:
          pattern: npm-*
          path: npm-packages
          merge-multiple: true

      - name: Publish platform packages
        run: |
          failures=0
          for pkg_dir in npm-packages/*/; do
            if [ -d "$pkg_dir" ]; then
              name=$(node -p "require('./$pkg_dir/package.json').name")
              version=$(node -p "require('./$pkg_dir/package.json').version")
              if npm view "$name@$version" version >/dev/null 2>&1; then
                echo "Skipping $name@$version — already published"
                continue
              fi
              echo "Publishing $name@$version..."
              if ! npm publish "$pkg_dir" --access public; then
                echo "::error::Failed to publish $name@$version"

                failures=$((failures + 1))
              fi
            fi
          done
          if [ "$failures" -gt 0 ]; then
            echo "::error::$failures platform package(s) failed to publish"
            exit 1
          fi

  publish-github-release:
    # Needs publish-platform-packages too (not just the builds) so a failed npm
    # publish blocks the release from going out — otherwise we can end up with
    # a public GitHub Release whose npm packages never shipped (see 2026-07-10
    # incident: platform-packages failed on an npm engine check, but this job
    # had no dependency on it and published the release anyway).
    needs: [build-macos, build-linux, build-windows, publish-platform-packages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "tag=v$(node -p "require('./packages/cli/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: koincode-*
          path: artifacts
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x artifacts/koincode-* 2>/dev/null || true

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}" --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: artifacts/koincode-*

  publish-main:
    # Must run after `publish-github-release` so the GitHub Release binaries are live
    # before npm reports the new version — otherwise checkForUpdate() (npm) can fire
    # before downloadSelfUpdate() (GitHub Releases) has anything to download.
    needs: [publish-platform-packages, publish-github-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm for trusted publishing support
        # See the matching comment in publish-platform-packages — pinned to
        # 11.x to avoid npm 12.0.0's broken provenance/sigstore path.
        run: npm install -g npm@^11.5.1

      - name: Publish to npm
        working-directory: packages/cli
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "Skipping $name@$version — already published"
          else
            npm publish --access public
          fi
