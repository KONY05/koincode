name: Publish & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build (npm bundle)
        run: bun run build:cli
        env:
          MIXPANEL_TOKEN: ${{ secrets.MIXPANEL_TOKEN }}

      - name: Publish to npm
        run: npm publish --access public
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-macos:
    needs: check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build standalone binaries (arm64 + x64)
        working-directory: packages/cli
        env:
          MIXPANEL_TOKEN: ${{ secrets.MIXPANEL_TOKEN }}
        run: bun bin/compile.ts --os=darwin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: koincode-darwin
          path: packages/cli/dist/koincode-*

  build-linux:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build standalone binary
        working-directory: packages/cli
        env:
          MIXPANEL_TOKEN: ${{ secrets.MIXPANEL_TOKEN }}
        run: bun bin/compile.ts --single

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: koincode-linux-x64
          path: packages/cli/dist/koincode-*

  build-windows:
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build standalone binary
        working-directory: packages/cli
        env:
          MIXPANEL_TOKEN: ${{ secrets.MIXPANEL_TOKEN }}
        shell: bash
        run: bun bin/compile.ts --single

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: koincode-windows-x64
          path: packages/cli/dist/koincode-*

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "tag=v$(node -p "require('./packages/cli/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x artifacts/koincode-* 2>/dev/null || true

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}" --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: artifacts/koincode-*
